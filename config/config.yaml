# ВАЖНО: Avito блокирует один и тот же товар в нескольких городах как «повторное размещение».
# Поэтому — ОДИН город (одно объявление на товар). Охват по региону — через Avito Доставку.
cities:
  - { id: "simferopol", name: "Симферополь", avito_location: "Республика Крым, Симферополь" }
pricing:
  rounding: up_to_90
  default_markup_pct: 5
  min_margin_abs: 0       # 0 = строго +5%, без принудительного пола маржи (по решению заказчика)
  rules: []
feed:
  max_active_ads: 20       # тест: 20 серий с готовыми карточками (приоритет card-having). Полный прогон — после смены промпта
  base_tags:
    Category: "Бытовая техника"
    GoodsType: "Климатическое оборудование"
    GoodsSubType: "Кондиционеры"
    AdType: "Товар приобретен на продажу"
    Condition: "Новое"
  # ProductType = «Тип климатического оборудования» — ТОЛЬКО из списка Avito.
  # Для всех наших кондиционеров (сплит/мобильные/полупром) валидно одно значение:
  product_type_default: "Кондиционеры и запчасти"
  product_type_map: {}
  # AirConditionerType = «Вид кондиционера»; AirConditionerSubType = «Тип кондиционера».
  # Значения — лучшая догадка, уточняются по валидатору/шаблону «Кондиционеры».
  # Вид кондиционера (AirConditionerType): Сплит-система | Мобильный | Фанкойл
  ac_type_map:
    2: "Сплит-система"
    6: "Сплит-система"
    7: "Мобильный"
  # Тип кондиционера (AirConditionerSubType): сплит→Настенный; мобильный→Напольный.
  # Для полупрома (6) тип зависит от модели (Кассетный/Канальный/…) — уточнить полный список.
  ac_subtype_map:
    2: "Настенный"
    6: "Кассетный"
    7: "Напольный"
  # Производитель (Vendor) — справочник Avito. Наш бренд -> имя в Avito.
  vendor_map:
    "EXPERTAIR by ZILON": "Zilon"
  # Бренды, которых нет в справочнике Avito → НЕ публикуем (вместо ошибки модерации).
  vendor_skip: []
content:
  title_max: 50
  description_max: 7000
  stop_words: ["скидка только сегодня", "звоните"]
catalog:
  report_category_ids: [2, 6, 7]
  exclude_title_patterns: ["%мульти%", "%виброопор%", "%охладитель воздуха%", "%зимний комплект%"]
  crimea_warehouse: "Симферополь"
# Уникальные карточки от фотоагента: файл avito-cards/{nc_code}.jpg → берётся вместо фото поставщика.
# Снимает блок Avito «повторное размещение» по фото (модели серии у поставщика делят одно фото).
cards:
  enabled: true
  dir: "/opt/oasis/staticfiles/avito-cards"
  base_url: "https://splithome.ru/static/avito-cards"
  exts: [".jpg", ".jpeg", ".png"]
