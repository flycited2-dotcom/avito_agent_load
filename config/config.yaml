cities:
  - { id: "simferopol", name: "Симферополь", avito_location: "Республика Крым, Симферополь" }
  - { id: "sevastopol", name: "Севастополь", avito_location: "Севастополь" }
pricing:
  rounding: up_to_90
  default_markup_pct: 5
  min_margin_abs: 0       # 0 = строго +5%, без принудительного пола маржи (по решению заказчика)
  rules: []
feed:
  max_active_ads: 6        # тестовая партия (3 товара × 2 города); после зелёного — поднять
  base_tags:
    Category: "Бытовая техника"
    GoodsType: "Климатическое оборудование"
    GoodsSubType: "Кондиционеры"
    AdType: "Товар приобретен на продажу"
    Condition: "Новое"
  # ProductType = «Тип климатического оборудования» — ТОЛЬКО из списка Avito.
  # Для всех наших кондиционеров (сплит/мобильные/полупром) валидно одно значение:
  product_type_default: "Кондиционеры и запчасти"
  product_type_map: {}
  # AirConditionerType = «Вид кондиционера»; AirConditionerSubType = «Тип кондиционера».
  # Значения — лучшая догадка, уточняются по валидатору/шаблону «Кондиционеры».
  ac_type_map:
    2: "Сплит-система"
    6: "Сплит-система"
    7: "Мобильный"
  ac_subtype_map:
    2: "Настенный"
    6: "Кассетный"
    7: "Моноблок"
content:
  title_max: 50
  description_max: 7000
  stop_words: ["скидка только сегодня", "звоните"]
catalog:
  report_category_ids: [2, 6, 7]
  exclude_title_patterns: ["%мульти%", "%виброопор%", "%охладитель воздуха%", "%зимний комплект%"]
  crimea_warehouse: "Симферополь"
