# Раздача Avito-фида по HTTPS. Вставить в server-блок нужного домена (HestiaCP),
# с бэкапом конфига и `nginx -t` перед reload. Боевые сайты (oasis/CRM) не трогать.
location = /avito/feed.xml {
    alias /opt/avito-bridge/feed_out/feed.xml;
    add_header Content-Type "application/xml; charset=utf-8";
}
